[build]
  command = "npm run build"
  publish = "dist"

# Index.html NUNCA é cacheado — sempre carrega a versão mais recente
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Assets com hash no nome (JS/CSS) podem cachear por muito tempo —
# quando o conteúdo muda, o nome muda também
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
